# Chart-art convention for unknown time:
#   - Saju: use noon local solar time. Year/month/day pillars are reliable;
#     hour pillar (시주) is omitted, not faked.
#   - Western: use noon local time and compute a "solar chart" — planetary
#     positions in correct signs, Ascendant + house cusps marked as
#     UNRELIABLE and not displayed in readings unless time is refined.
#
# Refine when an actual incorporation timestamp is known (filing time, first
# commit, first hire moment, founders' agreed birth moment).

notes: |
  Birth date confirmed by daeun on 2026-05-18. Time and place to be refined.
  Until then ora reads clone as a three-pillar saju (year/month/day) and a
  solar Western chart (no Ascendant).

  Known so far without ephemeris:
