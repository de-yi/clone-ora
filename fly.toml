# fly.toml app configuration file for de-yi-clone-ora
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#
# Socket Mode is outbound-only — the meaningful traffic is a WebSocket to Slack.
# Fly's autoscaler would interpret the lack of inbound HTTP as "idle" and stop
# the machine. To prevent that, the bot serves a minimal /health endpoint on
# :8080 (see src/ora/health.py) so Fly's proxy has something to probe, AND we
# explicitly set auto_stop_machines = false and min_machines_running = 1.

app = 'de-yi-clone-ora'
primary_region = 'nrt'

[build]

[deploy]
  strategy = 'immediate'

[env]
  ORA_DAILY_FORTUNE_HOUR = '9'
  ORA_DB_PATH = '/data/ora.db'
  ORA_TIMEZONE = 'Asia/Seoul'

[http_service]
  internal_port = 8080
  force_https = false
  auto_stop_machines = false
  auto_start_machines = false
  min_machines_running = 1
  processes = ['app']

[[mounts]]
  source = 'data'
  destination = '/data'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
